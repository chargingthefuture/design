kind = "web"
previewPath = "/ctf-landing/"
title = "Charging the Future — Landing Page"
version = "1.0.0"
id = "artifacts/ctf-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ctf-landing/" ]
localPort = 26046

[services.development]
run = "pnpm --filter @workspace/ctf-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ctf-landing", "run", "build" ]
publicDir = "artifacts/ctf-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26046"
BASE_PATH = "/ctf-landing/"
